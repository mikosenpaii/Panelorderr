<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKO STORE | Digital Solution</title>
    <link rel="icon" type="image/x-icon" href="https://files.catbox.moe/vea0ax.jpg">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #25D366;
            --accent: #ff3366;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: url('https://files.catbox.moe/lx2pi1.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: -1;
        }

        header { text-align: center; padding: 50px 20px 10px; }
        .logo {
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary);
            object-fit: cover;
        }
        
        .owner-profile {
            max-width: 450px; margin: 20px auto 30px; padding: 20px;
            background: rgba(255, 255, 255, 0.03); border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }

        .cart-icon {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary);
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4); z-index: 1000;
        }
        .cart-count {
            position: absolute; top: 0; right: 0; background: var(--accent);
            color: white; width: 22px; height: 22px; border-radius: 50%;
            font-size: 12px; display: flex; justify-content: center; align-items: center;
        }

        .container {
            max-width: 1100px; margin: 0 auto; padding: 0 20px 100px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
        }

        .card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 25px; text-align: center; transition: 0.4s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .price { font-size: 1.6rem; font-weight: 800; color: var(--primary); display: block; margin-bottom: 15px; }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 12px; border: none; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; text-decoration: none;
        }
        .btn-add { background: var(--primary); color: #000; }
        .btn-wa { background: transparent; border: 1px solid var(--secondary); color: var(--secondary); }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 320px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.5s; padding: 30px; border-left: 1px solid var(--primary);
        }
        .sidebar.active { right: 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span class="cart-count" id="cart-count">0</span>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--primary)">KERANJANG</h2>
        <div id="cart-items" style="max-height:50vh; overflow-y:auto; margin-bottom:20px;"></div>
        <p style="display:flex; justify-content:space-between; font-weight:bold;"><span>TOTAL:</span> <span id="cart-total">Rp 0</span></p>
        
        <button class="btn" style="background: white; color: black;" onclick="checkoutSekalipay()">💳 BAYAR OTOMATIS (QRIS)</button>
        <button class="btn btn-wa" onclick="checkoutWA()">📱 HUBUNGI ADMIN (WA)</button>
        <button class="btn" style="background:#333; color:white;" onclick="toggleCart()">TUTUP</button>
    </div>

    <header>
        <img src="https://files.catbox.moe/vea0ax.jpg" class="logo">
        <h1>Miko Store</h1>
        <div class="owner-profile">
            <h2>Miko Official</h2>
            <p>Admin & Owner Miko Store Digital<br>Aman • Cepat • Bergaransi</p>
        </div>
    </header>

    <div class="container" id="product-list"></div>

    <script>
        // LINK SERVER REPLIT AGENT KAMU
        const REPLIT_API_URL = "https://2ad8228d-4bba-42dd-9c5d-41c2abd917b1-00-1uy9348enozeg.spock.replit.dev"; 

        const products = [
            { id: 1, name: "ALIGHT MOTION PRO", price: 5000 },
            { id: 2, name: "CAPCUT PREMIUM", price: 10000 },
            { id: 3, name: "CANVA PRO", price: 3000 },
            { id: 4, name: "WINK PREMIUM", price: 5000 },
            { id: 5, name: "YOUTUBE PREMIUM", price: 5000 },
            { id: 6, name: "VIU PREMIUM", price: 3000 },
            { id: 7, name: "GEMINI AI PRO", price: 7000 },
            { id: 8, name: "SPOTIFY PREMIUM", price: 15000 },
            { id: 9, name: "IQIYI PREMIUM", price: 7000 },
            { id: 10, name: "CHATGPT PLUS", price: 6500 },
            { id: 11, name: "VIDIO TV PREMIER", price: 3000 },
            { id: 12, name: "SURXRAT V5", price: 55000 },
            { id: 13, name: "NOKOS", price: "Chat Admin" },
            { id: 14, name: "PANEL PRYTODAKTIL", price: "Chat Admin" },
            { id: 15, name: "SCRIPT BOT MD", price: "Chat Admin" }
        ];

        let cart = [];

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <span class="price">${typeof p.price === 'number' ? 'Rp ' + p.price.toLocaleString() : p.price}</span>
                    ${typeof p.price === 'number' ? `<button class="btn btn-add" onclick="addToCart(${p.id})">🛒 + KERANJANG</button>` : ''}
                    <button class="btn btn-wa" onclick="directWA('${p.name}')">📱 TANYA ADMIN</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(p => p.id === id);
            cart.push(p);
            updateCart();
            toggleCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map((item, index) => {
                if(typeof item.price === 'number') total += item.price;
                return `<div class="cart-item"><span>${item.name}</span><span>Rp ${item.price.toLocaleString()}</span></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = "Rp " + total.toLocaleString();
        }

        function toggleCart() { document.getElementById('sidebar').classList.toggle('active'); }

        async function checkoutSekalipay() {
            if (cart.length === 0) return alert("Keranjang kosong!");
            const total = cart.reduce((a, b) => a + (typeof b.price === 'number' ? b.price : 0), 0);
            const names = cart.map(i => i.name).join(', ');

            alert("Menghubungkan ke sistem pembayaran...");
            try {
                const response = await fetch(`${REPLIT_API_URL}/api/create-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: total, product_name: names })
                });
                const data = await response.json();
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    alert("Gagal membuat link. Gunakan WhatsApp.");
                }
            } catch (err) {
                alert("Server Replit belum aktif. Klik 'Run' di Replit.");
            }
        }

        function checkoutWA() {
            let total = cart.reduce((a, b) => a + (typeof b.price === 'number' ? b.price : 0), 0);
            window.open(`https://wa.me/6283185468716?text=Halo Miko, saya mau pesan produk ini. Total: Rp ${total}`);
        }

        function directWA(name) {
            window.open(`https://wa.me/6283185468716?text=Halo Miko, mau tanya ${name}`);
        }

        renderProducts();
    </script>
</body>
</html>
